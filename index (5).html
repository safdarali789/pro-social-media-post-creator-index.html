<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Social Media Creator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: #e2e8f0; }
        .header { background: rgba(15, 23, 42, 0.8); padding: 16px 24px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-download { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); }
        .main { display: grid; grid-template-columns: 300px 1fr 300px; gap: 0; height: calc(100vh - 64px); }
        @media (max-width: 1024px) { .main { grid-template-columns: 280px 1fr; } .right { display: none; } }
        @media (max-width: 768px) { .main { grid-template-columns: 1fr; } .left { display: none; } }
        .panel { background: rgba(30, 41, 59, 0.5); border-right: 1px solid rgba(148, 163, 184, 0.1); overflow-y: auto; padding: 20px; }
        .right { border-left: 1px solid rgba(148, 163, 184, 0.1); }
        .center { display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%); overflow: auto; }
        canvas { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); border-radius: 8px; max-width: 90%; height: auto; }
        .section { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
        .section:first-child { margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .btn { padding: 10px 8px; background: rgba(148, 163, 184, 0.05); border: 1px solid rgba(148, 163, 184, 0.2); color: #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 600; text-align: center; transition: all 0.3s; }
        .btn:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #3b82f6; }
        .btn.active { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); border-color: transparent; color: white; }
        .control { margin-bottom: 14px; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; padding: 8px 10px; background: rgba(148, 163, 184, 0.05); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; color: #e2e8f0; font-size: 12px; font-family: inherit; transition: all 0.3s; }
        input:focus, textarea:focus, select:focus { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        textarea { resize: vertical; min-height: 60px; font-family: 'Courier New', monospace; }
        input[type="color"] { cursor: pointer; padding: 4px; height: 40px; }
        .slider { display: grid; grid-template-columns: 1fr 40px; gap: 10px; align-items: center; }
        input[type="range"] { width: 100%; height: 4px; background: rgba(148, 163, 184, 0.2); border-radius: 2px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); cursor: pointer; box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4); }
        .value { font-size: 11px; color: #94a3b8; font-weight: 600; text-align: right; }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(148, 163, 184, 0.1); margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px 0; border: none; background: none; color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 12px; border-bottom: 2px solid transparent; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab:hover { color: #cbd5e1; }
        .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .emoji { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 120px; overflow-y: auto; margin-bottom: 12px; }
        .emoji-btn { aspect-ratio: 1; border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(148, 163, 184, 0.05); border-radius: 6px; cursor: pointer; font-size: 20px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .emoji-btn:hover { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; transform: scale(1.1); }
        .filter { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .filter-btn { padding: 8px; background: rgba(148, 163, 184, 0.05); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; color: #cbd5e1; cursor: pointer; font-size: 10px; font-weight: 600; transition: all 0.3s; }
        .filter-btn:hover { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #3b82f6; }
        .checkbox { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: white; padding: 12px 24px; border-radius: 8px; font-size: 12px; font-weight: 600; box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3); z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .status.show { opacity: 1; pointer-events: auto; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; text-transform: uppercase; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); }
        .btn-secondary { background: rgba(148, 163, 184, 0.1); color: #cbd5e1; padding: 10px; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; text-transform: uppercase; transition: all 0.3s; }
        .btn-secondary:hover { background: rgba(148, 163, 184, 0.15); border-color: rgba(148, 163, 184, 0.3); }
        .info { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 6px; padding: 12px; font-size: 11px; color: #93c5fd; line-height: 1.6; margin-top: 16px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(148, 163, 184, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.6); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">✨ Pro Creator</div>
        <button class="btn-download" onclick="downloadImage()">⬇️ Export</button>
    </div>

    <div class="main">
        <div class="panel left">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'design')">Design</button>
                <button class="tab" onclick="switchTab(event, 'text')">Text</button>
                <button class="tab" onclick="switchTab(event, 'style')">Style</button>
            </div>

            <div id="design" class="tab-content active">
                <div class="section">Platforms</div>
                <div class="grid">
                    <button class="btn active" onclick="setPlatform(1080, 1080, 'Instagram')">📸 Instagram</button>
                    <button class="btn" onclick="setPlatform(1080, 1350, 'Story')">📱 Story</button>
                    <button class="btn" onclick="setPlatform(1200, 628, 'Facebook')">👍 Facebook</button>
                    <button class="btn" onclick="setPlatform(1024, 512, 'Twitter')">𝕏 Twitter</button>
                    <button class="btn" onclick="setPlatform(1200, 1500, 'Pinterest')">📌 Pinterest</button>
                    <button class="btn" onclick="setPlatform(1280, 720, 'YouTube')">▶️ YouTube</button>
                    <button class="btn" onclick="setPlatform(1080, 1920, 'TikTok')">🎵 TikTok</button>
                    <button class="btn" onclick="setPlatform(800, 600, 'Custom')">⚙️ Custom</button>
                </div>

                <div class="section">Templates</div>
                <div class="grid" id="templates"></div>
            </div>

            <div id="text" class="tab-content">
                <div class="control">
                    <label class="label">Headline</label>
                    <textarea id="title" onchange="updateCanvas()" oninput="updateCanvas()">Your Amazing Title</textarea>
                </div>
                <div class="control">
                    <label class="label">Subtitle</label>
                    <textarea id="desc" onchange="updateCanvas()" oninput="updateCanvas()">Add supporting text here</textarea>
                </div>
                <div class="control">
                    <label class="label">Font Size</label>
                    <div class="slider">
                        <input type="range" id="size" min="20" max="80" value="48" onchange="updateCanvas()">
                        <div class="value" id="sizeVal">48</div>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Text Color</label>
                    <input type="color" id="color" value="#000000" onchange="updateCanvas()">
                </div>
                <div class="control">
                    <label class="label">Font</label>
                    <select id="font" onchange="updateCanvas()">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Impact" selected>Impact</option>
                        <option value="Courier">Courier</option>
                    </select>
                </div>
                <div class="section" style="margin-top: 20px;">Effects</div>
                <div class="checkbox">
                    <input type="checkbox" id="bold" onchange="updateCanvas()">
                    <label>Bold</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="italic" onchange="updateCanvas()">
                    <label>Italic</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="shadow" onchange="updateCanvas()">
                    <label>Shadow</label>
                </div>
            </div>

            <div id="style" class="tab-content">
                <div class="control">
                    <label class="label">Color 1</label>
                    <input type="color" id="bg1" value="#1e88e5" onchange="updateCanvas()">
                </div>
                <div class="control">
                    <label class="label">Color 2</label>
                    <input type="color" id="bg2" value="#42a5f5" onchange="updateCanvas()">
                </div>
                <div class="control">
                    <label class="label">Gradient</label>
                    <select id="grad" onchange="updateCanvas()">
                        <option value="h">Left to Right</option>
                        <option value="v">Top to Bottom</option>
                        <option value="d">Diagonal</option>
                        <option value="r">Circular</option>
                    </select>
                </div>
                <div class="control">
                    <label class="label">Image</label>
                    <input type="file" id="img" accept="image/*" onchange="loadImage()">
                </div>
                <div class="control">
                    <label class="label">Image Opacity</label>
                    <div class="slider">
                        <input type="range" id="imgop" min="0" max="1" step="0.1" value="0.6" onchange="updateCanvas()">
                        <div class="value" id="imgopVal">60%</div>
                    </div>
                </div>
                <div class="section" style="margin-top: 20px;">Filters</div>
                <div class="filter">
                    <button class="filter-btn" onclick="filter('bright', 120)">Bright</button>
                    <button class="filter-btn" onclick="filter('contrast', 120)">Contrast</button>
                    <button class="filter-btn" onclick="filter('sepia', 100)">Sepia</button>
                </div>
                <div class="control">
                    <label class="label">Brightness</label>
                    <div class="slider">
                        <input type="range" id="bright" min="50" max="200" value="100" onchange="updateCanvas()">
                        <div class="value" id="brightVal">100%</div>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Contrast</label>
                    <div class="slider">
                        <input type="range" id="contrast" min="50" max="200" value="100" onchange="updateCanvas()">
                        <div class="value" id="contrastVal">100%</div>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Saturation</label>
                    <div class="slider">
                        <input type="range" id="sat" min="0" max="200" value="100" onchange="updateCanvas()">
                        <div class="value" id="satVal">100%</div>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Blur</label>
                    <div class="slider">
                        <input type="range" id="blur" min="0" max="20" value="0" onchange="updateCanvas()">
                        <div class="value" id="blurVal">0px</div>
                    </div>
                </div>
                <div class="btns">
                    <button class="btn-secondary" onclick="location.reload()">↺ Reset</button>
                </div>
            </div>
        </div>

        <div class="center">
            <canvas id="canvas" width="1080" height="1080"></canvas>
        </div>

        <div class="panel right">
            <div class="section">Stickers</div>
            <div class="emoji" id="stickers"></div>
            <div class="section">Icons</div>
            <div class="emoji" id="icons"></div>
            <div class="info">
                <strong>Pro Tip:</strong> Use stickers and icons to enhance your design. Click any emoji to add it.
            </div>
            <div class="info" style="margin-top: 12px;">
                <strong>Size:</strong><br><span id="info">1080 × 1080 px</span>
            </div>
        </div>
    </div>

    <div class="status" id="status">Ready to create ✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let bgImg = null;

        const tmpl = [
            {n:'Blue',g1:'#1e88e5',g2:'#42a5f5'},{n:'Purple',g1:'#7e57c2',g2:'#ab47bc'},{n:'Pink',g1:'#ec407a',g2:'#f06292'},
            {n:'Cyan',g1:'#00acc1',g2:'#26c6da'},{n:'Green',g1:'#43a047',g2:'#66bb6a'},{n:'Orange',g1:'#fb8c00',g2:'#ffa726'},
            {n:'Red',g1:'#e53935',g2:'#ef5350'},{n:'Teal',g1:'#00796b',g2:'#009688'},{n:'Indigo',g1:'#3949ab',g2:'#5c6bc0'},
            {n:'Amber',g1:'#f57f17',g2:'#fbc02d'}
        ];
        const stk = ['😀','😍','🎉','⭐','💯','🔥','✨','🚀','💡','👍','❤️','💖','🎨','🌟','🎯','💼'];
        const ico = ['🏠','📱','🎬','📸','🎵','📊','💻','🎓','🏆','🎁','📚','🌍','🚗','✈️','🍕'];

        function initTemplates(){
            const t=document.getElementById('templates');
            t.innerHTML='';
            tmpl.forEach((x,i)=>{
                const c=document.createElement('div');
                c.className=`btn ${i===0?'active':''}`;
                c.style.background=`linear-gradient(135deg,${x.g1},${x.g2})`;
                c.textContent=x.n;
                c.onclick=()=>selectTemplate(x,c);
                t.appendChild(c);
            });
        }

        function initEmojis(){
            const s=document.getElementById('stickers'),i=document.getElementById('icons');
            [s,i].forEach(e=>e.innerHTML='');
            stk.forEach(x=>{const b=document.createElement('button');b.className='emoji-btn';b.textContent=x;b.onclick=()=>msg(`Added ${x}`);document.getElementById('stickers').appendChild(b);});
            ico.forEach(x=>{const b=document.createElement('button');b.className='emoji-btn';b.textContent=x;b.onclick=()=>msg(`Added ${x}`);document.getElementById('icons').appendChild(b);});
        }

        function setPlatform(w,h,n){canvas.width=w;canvas.height=h;document.getElementById('info').textContent=`${w} × ${h} px`;document.querySelectorAll('.grid:first-child .btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');updateCanvas();msg(`Switched to ${n}`);}

        function selectTemplate(t,c){document.getElementById('bg1').value=t.g1;document.getElementById('bg2').value=t.g2;document.querySelectorAll('#templates .btn').forEach(b=>b.classList.remove('active'));c.classList.add('active');updateCanvas();}

        function loadImage(){const f=document.getElementById('img').files[0];if(f){const r=new FileReader();r.onload=e=>{const i=new Image();i.onload=()=>{bgImg=i;updateCanvas();msg('Image loaded');};i.src=e.target.result;};r.readAsDataURL(f);}}

        function updateCanvas(){
            const w=canvas.width,h=canvas.height;
            const b1=document.getElementById('bg1').value,b2=document.getElementById('bg2').value;
            const gd=document.getElementById('grad').value;
            const op=parseFloat(document.getElementById('imgop').value);
            const br=document.getElementById('bright').value;
            const co=document.getElementById('contrast').value;
            const sa=document.getElementById('sat').value;
            const bl=document.getElementById('blur').value;

            ctx.fillStyle=b1;
            ctx.fillRect(0,0,w,h);

            let g;
            if(gd==='h')g=ctx.createLinearGradient(0,0,w,0);
            else if(gd==='v')g=ctx.createLinearGradient(0,0,0,h);
            else if(gd==='d')g=ctx.createLinearGradient(0,0,w,h);
            else g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)/2);
            g.addColorStop(0,b1);
            g.addColorStop(1,b2);
            ctx.fillStyle=g;
            ctx.fillRect(0,0,w,h);

            if(bgImg){ctx.globalAlpha=op;ctx.drawImage(bgImg,0,0,w,h);ctx.globalAlpha=1;}

            ctx.filter=`brightness(${br}%) contrast(${co}%) saturate(${sa}%) blur(${bl}px)`;

            const t=document.getElementById('title').value;
            const d=document.getElementById('desc').value;
            const s=parseInt(document.getElementById('size').value);
            const cl=document.getElementById('color').value;
            const f=document.getElementById('font').value;
            const bo=document.getElementById('bold').checked;
            const it=document.getElementById('italic').checked;
            const sh=document.getElementById('shadow').checked;

            let fs='';
            if(bo)fs+='bold ';
            if(it)fs+='italic ';
            fs+=`${s}px ${f}`;

            ctx.font=fs;
            ctx.textAlign='center';
            ctx.textBaseline='middle';

            if(sh){ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=20;ctx.shadowOffsetX=4;ctx.shadowOffsetY=4;}

            ctx.fillStyle=cl;
            ctx.strokeStyle='rgba(0,0,0,0.3)';
            ctx.lineWidth=3;
            ctx.strokeText(t,w/2,h/2-80);
            ctx.fillText(t,w/2,h/2-80);

            ctx.shadowColor='transparent';
            ctx.font=`${s*0.5}px ${f}`;
            ctx.fillStyle=cl;
            ctx.strokeStyle='rgba(0,0,0,0.2)';
            ctx.lineWidth=2;
            ctx.strokeText(d,w/2,h/2+60);
            ctx.fillText(d,w/2,h/2+60);

            ctx.filter='none';
        }

        function filter(t,v){
            if(t==='bright')document.getElementById('bright').value=v;
            else if(t==='contrast')document.getElementById('contrast').value=v;
            else if(t==='sepia'){document.getElementById('bright').value=110;document.getElementById('sat').value=80;}
            updateCanvas();
        }

        function switchTab(e,t){document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById(t).classList.add('active');e.target.classList.add('active');}

        function downloadImage(){const l=document.createElement('a');l.href=canvas.toDataURL('image/png');l.download=`design-${Date.now()}.png`;l.click();msg('Exported successfully ✅');}

        function msg(m){const s=document.getElementById('status');s.textContent=m;s.classList.add('show');setTimeout(()=>s.classList.remove('show'),3000);}

        document.getElementById('size').addEventListener('input',e=>{document.getElementById('sizeVal').textContent=e.target.value;updateCanvas();});
        document.getElementById('imgop').addEventListener('input',e=>{document.getElementById('imgopVal').textContent=Math.round(e.target.value*100)+'%';updateCanvas();});
        document.getElementById('bright').addEventListener('input',e=>{document.getElementById('brightVal').textContent=e.target.value+'%';updateCanvas();});
        document.getElementById('contrast').addEventListener('input',e=>{document.getElementById('contrastVal').textContent=e.target.value+'%';updateCanvas();});
        document.getElementById('sat').addEventListener('input',e=>{document.getElementById('satVal').textContent=e.target.value+'%';updateCanvas();});
        document.getElementById('blur').addEventListener('input',e=>{document.getElementById('blurVal').textContent=e.target.value+'px';updateCanvas();});

        initTemplates();
        initEmojis();
        updateCanvas();
    </script>
</body>
</html>
