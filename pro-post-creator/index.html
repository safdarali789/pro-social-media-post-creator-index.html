<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Social Media Creator - Design Stunning Posts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn-download {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }
        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr 360px;
            gap: 0;
            height: calc(100vh - 64px);
        }
        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 280px 1fr;
            }
            .right-panel {
                display: none;
            }
        }
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .left-panel {
                display: none;
            }
        }
        .panel {
            background: rgba(30, 41, 59, 0.5);
            border-right: 1px solid rgba(148, 163, 184, 0.1);
            overflow-y: auto;
            padding: 20px;
        }
        .left-panel {
            border-right: 1px solid rgba(148, 163, 184, 0.1);
        }
        .right-panel {
            border-left: 1px solid rgba(148, 163, 184, 0.1);
        }
        .canvas-area {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%);
            position: relative;
            overflow: auto;
        }
        canvas {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            max-width: 90%;
            height: auto;
            cursor: crosshair;
        }
        .section-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #94a3b8;
            margin: 20px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        .section-header:first-child {
            margin-top: 0;
        }
        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .platform-btn {
            padding: 12px 8px;
            background: rgba(148, 163, 184, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            line-height: 1.3;
        }
        .platform-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .platform-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-color: transparent;
            color: white;
        }
        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .template-card {
            aspect-ratio: 1;
            border-radius: 6px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            cursor: pointer;
            font-size: 9px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .template-card:hover {
            transform: translateY(-2px);
            border-color: rgba(148, 163, 184, 0.4);
        }
        .template-card.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .control-group {
            margin-bottom: 14px;
        }
        .control-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="color"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 8px 10px;
            background: rgba(148, 163, 184, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.3s;
        }
        input[type="text"]:focus,
        textarea:focus,
        select:focus,
        input[type="color"]:focus {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 60px;
            font-family: 'Courier New', monospace;
        }
        input[type="color"] {
            cursor: pointer;
            padding: 4px;
            height: 40px;
        }
        .slider-group {
            display: grid;
            grid-template-columns: 1fr 40px;
            gap: 10px;
            align-items: center;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            cursor: pointer;
            border: none;
        }
        .value-display {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            text-align: right;
        }
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tab-btn:hover {
            color: #cbd5e1;
        }
        .tab-btn.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .sticker-btn {
            aspect-ratio: 1;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(148, 163, 184, 0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sticker-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            transform: scale(1.1);
        }
        .filter-preset {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .filter-btn {
            padding: 8px;
            background: rgba(148, 163, 184, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .filter-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
        }
        .checkbox-label {
            font-size: 12px;
            color: #cbd5e1;
            cursor: pointer;
            user-select: none;
        }
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status-bar.show {
            opacity: 1;
            pointer-events: auto;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
            padding: 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.15);
            border-color: rgba(148, 163, 184, 0.3);
        }
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            padding: 12px;
            font-size: 11px;
            color: #93c5fd;
            line-height: 1.6;
            margin-top: 16px;
        }
        .info-box strong {
            color: #3b82f6;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">✨ Pro Creator</div>
        <div class="header-actions">
            <button class="btn-download" onclick="downloadImage()">⬇️ Export</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Panel -->
        <div class="panel left-panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'platforms')">Designs</button>
                <button class="tab-btn" onclick="switchTab(event, 'text')">Text</button>
                <button class="tab-btn" onclick="switchTab(event, 'style')">Style</button>
            </div>

            <!-- Platforms Tab -->
            <div id="platforms" class="tab-content active">
                <div class="section-header">Platform Templates</div>
                <div class="platform-grid">
                    <button class="platform-btn active" onclick="setPlatform(1080, 1080, 'Instagram Post')">📸<br>Instagram</button>
                    <button class="platform-btn" onclick="setPlatform(1080, 1350, 'Instagram Story')">📱<br>Story</button>
                    <button class="platform-btn" onclick="setPlatform(1200, 628, 'Facebook Cover')">👍<br>Facebook</button>
                    <button class="platform-btn" onclick="setPlatform(1024, 512, 'Twitter/X')">𝕏<br>Twitter</button>
                    <button class="platform-btn" onclick="setPlatform(1200, 1500, 'Pinterest')">📌<br>Pinterest</button>
                    <button class="platform-btn" onclick="setPlatform(1280, 720, 'YouTube')">▶️<br>YouTube</button>
                    <button class="platform-btn" onclick="setPlatform(1080, 1920, 'TikTok')">🎵<br>TikTok</button>
                    <button class="platform-btn" onclick="setPlatform(800, 600, 'Custom')">⚙️<br>Custom</button>
                </div>

                <div class="section-header">Color Templates</div>
                <div class="template-grid" id="templateGrid"></div>
            </div>

            <!-- Text Tab -->
            <div id="text" class="tab-content">
                <div class="control-group">
                    <label class="control-label">Headline</label>
                    <textarea id="titleText" onchange="updateCanvas()" oninput="updateCanvas()">Your Amazing Headline</textarea>
                </div>

                <div class="control-group">
                    <label class="control-label">Subtitle</label>
                    <textarea id="descText" onchange="updateCanvas()" oninput="updateCanvas()">Add your supporting text here</textarea>
                </div>

                <div class="control-group">
                    <label class="control-label">Font Size</label>
                    <div class="slider-group">
                        <input type="range" id="fontSize" min="20" max="80" value="48" onchange="updateCanvas()">
                        <div class="value-display" id="fontSizeValue">48</div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Text Color</label>
                    <input type="color" id="textColor" value="#000000" onchange="updateCanvas()">
                </div>

                <div class="control-group">
                    <label class="control-label">Font Family</label>
                    <select id="fontFamily" onchange="updateCanvas()">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Impact" selected>Impact</option>
                        <option value="Courier">Courier</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Times New Roman">Times New Roman</option>
                    </select>
                </div>

                <div class="section-header" style="margin-top: 20px;">Text Effects</div>
                <div class="checkbox-group">
                    <input type="checkbox" id="textBold" onchange="updateCanvas()">
                    <label class="checkbox-label" for="textBold">Bold</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="textItalic" onchange="updateCanvas()">
                    <label class="checkbox-label" for="textItalic">Italic</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="textShadow" onchange="updateCanvas()">
                    <label class="checkbox-label" for="textShadow">Shadow</label>
                </div>
            </div>

            <!-- Style Tab -->
            <div id="style" class="tab-content">
                <div class="control-group">
                    <label class="control-label">Background Color 1</label>
                    <input type="color" id="bgColor1" value="#1e88e5" onchange="updateCanvas()">
                </div>

                <div class="control-group">
                    <label class="control-label">Background Color 2</label>
                    <input type="color" id="bgColor2" value="#42a5f5" onchange="updateCanvas()">
                </div>

                <div class="control-group">
                    <label class="control-label">Gradient Direction</label>
                    <select id="gradientType" onchange="updateCanvas()">
                        <option value="linear-h">Left to Right</option>
                        <option value="linear-v">Top to Bottom</option>
                        <option value="diagonal">Diagonal</option>
                        <option value="radial">Circular</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Background Image</label>
                    <input type="file" id="bgImage" accept="image/*" onchange="loadBackgroundImage()">
                </div>

                <div class="control-group">
                    <label class="control-label">Image Opacity</label>
                    <div class="slider-group">
                        <input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.6" onchange="updateCanvas()">
                        <div class="value-display" id="bgOpacityValue">60%</div>
                    </div>
                </div>

                <div class="section-header" style="margin-top: 20px;">Filters</div>
                <div class="filter-preset">
                    <button class="filter-btn" onclick="applyFilter('brightness', 120)">Bright</button>
                    <button class="filter-btn" onclick="applyFilter('contrast', 120)">Contrast</button>
                    <button class="filter-btn" onclick="applyFilter('sepia', 100)">Sepia</button>
                </div>

                <div class="control-group">
                    <label class="control-label">Brightness</label>
                    <div class="slider-group">
                        <input type="range" id="brightness" min="50" max="200" value="100" onchange="updateCanvas()">
                        <div class="value-display" id="brightnessValue">100%</div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Contrast</label>
                    <div class="slider-group">
                        <input type="range" id="contrast" min="50" max="200" value="100" onchange="updateCanvas()">
                        <div class="value-display" id="contrastValue">100%</div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Saturation</label>
                    <div class="slider-group">
                        <input type="range" id="saturation" min="0" max="200" value="100" onchange="updateCanvas()">
                        <div class="value-display" id="saturationValue">100%</div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Blur</label>
                    <div class="slider-group">
                        <input type="range" id="blur" min="0" max="20" value="0" onchange="updateCanvas()">
                        <div class="value-display" id="blurValue">0px</div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="resetAll()">↺ Reset</button>
                </div>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <canvas id="canvas" width="1080" height="1080"></canvas>
        </div>

        <!-- Right Panel -->
        <div class="panel right-panel">
            <div class="section-header">Stickers & Emojis</div>
            <div class="sticker-grid" id="stickerGrid"></div>

            <div class="section-header">Icons</div>
            <div class="sticker-grid" id="iconGrid"></div>

            <div class="info-box">
                <strong>Pro Tip:</strong> Use stickers and icons to make your designs more engaging. Click any to add to your post.
            </div>

            <div class="info-box" style="margin-top: 12px;">
                <strong>Current Size:</strong><br>
                <span id="sizeInfo">1080 × 1080 px</span>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">Ready to create amazing posts ✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let backgroundImage = null;

        const templates = [
            { name: 'Blue', g1: '#1e88e5', g2: '#42a5f5' },
            { name: 'Purple', g1: '#7e57c2', g2: '#ab47bc' },
            { name: 'Pink', g1: '#ec407a', g2: '#f06292' },
            { name: 'Cyan', g1: '#00acc1', g2: '#26c6da' },
            { name: 'Green', g1: '#43a047', g2: '#66bb6a' },
            { name: 'Orange', g1: '#fb8c00', g2: '#ffa726' },
            { name: 'Red', g1: '#e53935', g2: '#ef5350' },
            { name: 'Teal', g1: '#00796b', g2: '#009688' },
            { name: 'Indigo', g1: '#3949ab', g2: '#5c6bc0' },
            { name: 'Amber', g1: '#f57f17', g2: '#fbc02d' }
        ];

        const stickers = ['😀', '😍', '🎉', '⭐', '💯', '🔥', '✨', '🚀', '💡', '👍', '❤️', '💖', '🎨', '🌟', '🎯', '💼'];
        const icons = ['🏠', '📱', '🎬', '📸', '🎵', '📊', '💻', '🎓', '🏆', '🎁', '📚', '🌍', '🚗', '✈️', '🍕'];

        function initializeTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';
            templates.forEach((template, index) => {
                const card = document.createElement('div');
                card.className = `template-card ${index === 0 ? 'active' : ''}`;
                card.style.background = `linear-gradient(135deg, ${template.g1} 0%, ${template.g2} 100%)`;
                card.textContent = template.name;
                card.onclick = () => selectTemplate(template, card);
                grid.appendChild(card);
            });
        }

        function initializeStickers() {
            const grid = document.getElementById('stickerGrid');
            grid.innerHTML = '';
            stickers.forEach(sticker => {
                const btn = document.createElement('button');
                btn.className = 'sticker-btn';
                btn.textContent = sticker;
                btn.onclick = () => showStatus(`Added ${sticker} to your design`);
                grid.appendChild(btn);
            });
        }

        function initializeIcons() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            icons.forEach(icon => {
                const btn = document.createElement('button');
                btn.className = 'sticker-btn';
                btn.textContent = icon;
                btn.onclick = () => showStatus(`Added ${icon} to your design`);
                grid.appendChild(btn);
            });
        }

        function setPlatform(w, h, name) {
            canvas.width = w;
            canvas.height = h;
            document.getElementById('sizeInfo').textContent = `${w} × ${h} px`;
            
            document.querySelectorAll('.platform-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateCanvas();
            showStatus(`Switched to ${name}`);
        }

        function selectTemplate(template, card) {
            document.getElementById('bgColor1').value = template.g1;
            document.getElementById('bgColor2').value = template.g2;
            
            document.querySelectorAll('.template-card').forEach(el => el.classList.remove('active'));
            card.classList.add('active');
            updateCanvas();
        }

        function loadBackgroundImage() {
            const file = document.getElementById('bgImage').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        backgroundImage = img;
                        updateCanvas();
                        showStatus('Image loaded successfully');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function updateCanvas() {
            const w = canvas.width;
            const h = canvas.height;
            const bg1 = document.getElementById('bgColor1').value;
            const bg2 = document.getElementById('bgColor2').value;
            const gradType = document.getElementById('gradientType').value;
            const bgOp = parseFloat(document.getElementById('bgOpacity').value);
            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;
            const saturation = document.getElementById('saturation').value;
            const blur = document.getElementById('blur').value;

            // Clear canvas
            ctx.fillStyle = bg1;
            ctx.fillRect(0, 0, w, h);

            // Gradient
            let gradient;
            if (gradType === 'linear-h') {
                gradient = ctx.createLinearGradient(0, 0, w, 0);
            } else if (gradType === 'linear-v') {
                gradient = ctx.createLinearGradient(0, 0, 0, h);
            } else if (gradType === 'diagonal') {
                gradient = ctx.createLinearGradient(0, 0, w, h);
            } else {
                gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h)/2);
            }
            gradient.addColorStop(0, bg1);
            gradient.addColorStop(1, bg2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            // Background image
            if (backgroundImage) {
                ctx.globalAlpha = bgOp;
                ctx.drawImage(backgroundImage, 0, 0, w, h);
                ctx.globalAlpha = 1;
            }

            // Filters
            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%) blur(${blur}px)`;

            // Text
            const titleText = document.getElementById('titleText').value;
            const descText = document.getElementById('descText').value;
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const textColor = document.getElementById('textColor').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const isBold = document.getElementById('textBold').checked;
            const isItalic = document.getElementById('textItalic').checked;
            const hasShadow = document.getElementById('textShadow').checked;

            let fontStr = '';
            if (isBold) fontStr += 'bold ';
            if (isItalic) fontStr += 'italic ';
            fontStr += `${fontSize}px ${fontFamily}`;

            ctx.font = fontStr;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (hasShadow) {
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 4;
            }

            // Draw text with outline for better visibility
            ctx.fillStyle = textColor;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 3;
            ctx.strokeText(titleText, w/2, h/2 - 80);
            ctx.fillText(titleText, w/2, h/2 - 80);

            ctx.shadowColor = 'transparent';
            ctx.font = `${fontSize * 0.5}px ${fontFamily}`;
            ctx.fillStyle = textColor;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.strokeText(descText, w/2, h/2 + 60);
            ctx.fillText(descText, w/2, h/2 + 60);

            ctx.filter = 'none';
        }

        function applyFilter(type, value) {
            if (type === 'brightness') document.getElementById('brightness').value = value;
            else if (type === 'contrast') document.getElementById('contrast').value = value;
            else if (type === 'sepia') {
                document.getElementById('brightness').value = 110;
                document.getElementById('saturation').value = 80;
            }
            updateCanvas();
        }

        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `design-${Date.now()}.png`;
            link.click();
            showStatus('Design exported successfully ✅');
        }

        function resetAll() {
            if (confirm('Reset all settings to default?')) {
                location.reload();
            }
        }

        function showStatus(message) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.classList.add('show');
            setTimeout(() => {
                bar.classList.remove('show');
            }, 3000);
        }

        // Value display updates
        document.getElementById('fontSize').addEventListener('input', (e) => {
            document.getElementById('fontSizeValue').textContent = e.target.value;
            updateCanvas();
        });

        document.getElementById('bgOpacity').addEventListener('input', (e) => {
            document.getElementById('bgOpacityValue').textContent = Math.round(e.target.value * 100) + '%';
            updateCanvas();
        });

        document.getElementById('brightness').addEventListener('input', (e) => {
            document.getElementById('brightnessValue').textContent = e.target.value + '%';
            updateCanvas();
        });

        document.getElementById('contrast').addEventListener('input', (e) => {
            document.getElementById('contrastValue').textContent = e.target.value + '%';
            updateCanvas();
        });

        document.getElementById('saturation').addEventListener('input', (e) => {
            document.getElementById('saturationValue').textContent = e.target.value + '%';
            updateCanvas();
        });

        document.getElementById('blur').addEventListener('input', (e) => {
            document.getElementById('blurValue').textContent = e.target.value + 'px';
            updateCanvas();
        });

        // Initialize
        initializeTemplates();
        initializeStickers();
        initializeIcons();
        updateCanvas();
    </script>
</body>
</html>
